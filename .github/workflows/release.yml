name: Release NuGet Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  PACKAGE_VERSION: 2019065026.0.0
  PROJECT_PATH: MyMath/Math.Lib/Math.Lib.csproj

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        working-directory: MyMath
        run: dotnet restore

      - name: Build solution
        working-directory: MyMath
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        working-directory: MyMath
        run: dotnet test --configuration Release --no-build

      - name: Pack NuGet package
        run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output artifacts

      - name: Publish package to GitHub Packages
        run: dotnet nuget push "artifacts/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: Release v${{ env.PACKAGE_VERSION }}
          files: artifacts/*.nupkg
          generate_release_notes: true
